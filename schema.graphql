schema {
    query: Query
    mutation: Mutation
}

type Todo {
    id: ID!
    description: String!
    completed: Boolean!
    dueDate: String!
}

type TodoResponse {
    success: Boolean!
    errors: [String]
    todo: Todo
}

type TodoListResponse {
    success: Boolean!
    errors: [String]
    todos: [Todo]
}

type Query {
    todos: TodoListResponse!
    todo(todoId: ID!): TodoResponse!
}

type DeleteResponse {
    success: Boolean!
    errors: [String]
}

type Mutation {
    createTodo(description: String!, dueDate: String!): TodoResponse!
    deleteTodo(todoId: ID!): DeleteResponse!
    markDone(todoId: String!): TodoResponse!
    updateDueDate(todoId: String, newDate: String!): TodoResponse!
}
